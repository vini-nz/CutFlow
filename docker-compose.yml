services:
  db:
    image: postgres:16-alpine
    container_name: cutflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-cutflow}
      POSTGRES_USER: ${DB_USER:-cutflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cutflow}
    ports:
      - "5432:5432"
    volumes:
      - cutflow_pgdata:/var/lib/postgresql/data
      # Scripts em ordem alfabética: o DDL cria o schema, o seed popula depois.
      - ./db/cutflow_ddl.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cutflow} -d ${DB_NAME:-cutflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: cutflow-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-cutflow}
      DB_USER: ${DB_USER:-cutflow}
      DB_PASSWORD: ${DB_PASSWORD:-cutflow}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-lax}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: cutflow-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Base relativa: a SPA fala com a API na MESMA origem, via proxy do Vite.
      VITE_API_URL: ${VITE_API_URL:-/api/v1}
      # Alvo do proxy dentro da rede do compose (ver vite.config.js).
      VITE_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js

volumes:
  cutflow_pgdata:
